name: Fly.io Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy backend
        run: flyctl deploy --remote-only -c deploy/fly.backend.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy frontend
        run: flyctl deploy --remote-only -c deploy/fly.frontend.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
