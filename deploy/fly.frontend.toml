app = "bytebites-web"
primary_region = "sin"

[build]
  dockerfile = "frontend-react/Dockerfile"
  [build.args]
    REACT_APP_API_URL = "https://bytebites-api.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
